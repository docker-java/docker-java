sudo: required
dist: trusty
language: java

services:
  - docker

jdk:
 - oraclejdk7

env:
  global:
    - DOCKER_TLS_VERIFY=0

  matrix:
    - DOCKER_VERSION="1.11.2-0~trusty" DOCKER_HOST="tcp://127.0.0.1:2375"
    - DOCKER_VERSION="1.11.2-0~trusty" DOCKER_HOST="unix:///var/run/docker.sock"
    - DOCKER_VERSION="1.10.3-0~trusty"

cache:
  directories:
  - $HOME/.cache

before_install:
  - pip install --user codecov
  - docker info
  - docker version
  - ./travis-before-install.sh

script: mvn test

after_success:
  - ./travis-after-success.sh

after_script:
  - sudo cat /var/log/upstart/docker.log
